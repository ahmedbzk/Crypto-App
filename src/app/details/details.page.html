<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>    <ion-title>    {{justcoininfo && justcoininfo.name}}   </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div style="padding: 5%; justify-content: center; display: flex;">

    <img src="{{justcoininfo && justcoininfo.image}}">
    
    </div>

    <div style="justify-content: center; display: flex; margin-bottom: 15px;">    
      <ion-label style="color: white;font-size: 30px; background-color: black; padding: 10px;"><strong>{{justcoininfo && justcoininfo.current_price}}$</strong></ion-label>
    </div>


<!-- 24H DEĞİŞKENLİK -->
    <div>
      <ion-row style="text-align: center;">
        <ion-col> 

          <ion-label>
          <strong>
            <u>High 24h</u><br>
          </strong>  
        </ion-label>

          <ion-label style="color: green;">
            <strong> 
              {{justcoininfo && justcoininfo.high_24h}}$
            </strong>
          </ion-label>

        </ion-col>

        <ion-col> 
          <ion-label>
          <strong>
            <u>Low 24h</u><br>
          </strong>  
        </ion-label>

          <ion-label style="color: red;"><strong> {{justcoininfo && justcoininfo.low_24h}}$</strong></ion-label>

        </ion-col>
      </ion-row>
    </div>

  <!-- BUY AND SELL -->

  <div style="margin-top: 10%;">
    <ion-row style="text-align: center;" >

      <ion-col>
        <ion-button color="success" expand="full">
        Buy
        </ion-button>
      </ion-col>
      
      <ion-col>
        <ion-button color="danger" expand="full">
        Sell
        </ion-button>
      </ion-col>

    </ion-row>
  </div>
</ion-content>





<ion-footer style="border-top: 1px solid grey;">
  <div style="background-color: white;">
    <ion-row>

      <ion-col style="text-align: center;"  >
        <ion-icon name="home-outline" style="font-size: 27px; " [routerLink]="['/folder']" routerLinkActive="router-link-active"></ion-icon><br>
        <ion-label style="font-size: 10px;"><strong>Home</strong></ion-label>

      </ion-col>
      <ion-col style="text-align: center; " >
        <ion-icon name="search-sharp" style="font-size: 27px; margin-right: 15px; " [routerLink]="['/search']" routerLinkActive="router-link-active" ></ion-icon><br>
        <ion-label style="font-size: 10px; margin-right: 15px;"><strong>Search</strong></ion-label>
      </ion-col>

        <ion-col>
          <div style="background-color: red; border-radius: 60%; height: 100%; text-align: center;" >
            <ion-icon name="logo-bitcoin" style="color: white; font-size: 40px; margin-top: 3px;"></ion-icon><br>
          </div>
        </ion-col>

      <ion-col style="text-align: center" [routerLink]="['/wallet']" routerLinkActive="router-link-active" >
        <ion-icon name="wallet-outline" style="font-size: 27px;  margin-left: 15px; "></ion-icon><br>
        <ion-label style=" font-size: 10px; margin-left: 15px; "><strong>Wallet</strong></ion-label>
      </ion-col>

      <ion-col style="text-align: center" >
        <ion-icon name="person-circle-outline" style="font-size: 27px; "></ion-icon><br>
        <ion-label style=" font-size: 10px; "><strong>Account</strong></ion-label>
      </ion-col>
    </ion-row>
  </div>
</ion-footer>
