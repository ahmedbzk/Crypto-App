

<ion-content [fullscreen]="true">

  <img src="assets/logo.png" style="border-bottom: 1px solid black;">

  <!-- REFRESHER -->
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="crescent"
      refreshingText="Refreshing...">
    </ion-refresher-content>
  </ion-refresher>

  <!-- 10 COİN LİSTELEME -->
  
  <ion-list>
    <ion-item *ngFor="let info of tencoininfo.slice(0,10)" [routerLink]="['/details',info.id]" routerLinkActive="router-link-active" >
      <ion-avatar slot="start">
        <img src="{{info.image}}" />
      </ion-avatar>
      
      <ion-label>
        <h2>{{info.name}}</h2>
        <h3><span >Price: </span><strong >{{info.current_price}}$</strong> </h3>
      </ion-label>
      <ion-label>
        <span style="margin-left: 70px; font-size: 15px;"  [ngStyle]="{'color': info.price_change_percentage_24h<0 ? 'red' : 'green' }"><strong>%{{info.price_change_percentage_24h.toFixed(2)}}</strong> </span>
      </ion-label>
    </ion-item>
  </ion-list>

  

</ion-content>

<ion-footer>
  <ion-toolbar >
    <ion-row>
      <ion-col style="text-align: center; background-color: black; "  >
        <ion-icon name="home-sharp" style="font-size: 30px; color: white;"></ion-icon><br>
        <ion-label style="color: white;  font-size: 10px;"><strong>-- Home --</strong></ion-label>

      </ion-col>
      <ion-col style="text-align: center; " >
        <ion-icon name="search-sharp" style="font-size: 30px; " [routerLink]="['/search']" routerLinkActive="router-link-active"></ion-icon><br>
        <ion-label style="font-size: 10px;"><strong>-- Search --</strong></ion-label>
      </ion-col>
      <ion-col style="text-align: center" [routerLink]="['/wallet']" routerLinkActive="router-link-active" >
        <ion-icon name="wallet-sharp" style="font-size: 30px;"></ion-icon><br>
        <ion-label style=" font-size: 10px;"><strong>-- Wallet --</strong></ion-label>

      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-footer>
