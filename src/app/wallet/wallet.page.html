

<!-- WALLET -->
<div  id="divcolor" >
  <ion-row style="text-align: center; justify-content: center; align-items: center; display: flex; " >
    <ion-col style="margin-top: 8%;">
      <ion-label style="font-size: 190%; color: white; ">${{balance.toFixed(2)}}</ion-label><br>
      <ion-label style="font-size: 80%; margin-top: 15px; color: rgb(212, 212, 212);">My Wallet</ion-label>
    </ion-col>
  </ion-row>

  <!-- WALLET ALTI BUTONLAR -->
  <ion-row style="margin-top: 7%;" >
    <ion-col >
      <div class="col-1">
      <ion-icon name="bag-add-outline" style="color: white; font-size: 25px;" [routerLink]="['/details/',wallet[0].id]" routerLinkActive="router-link-active" ></ion-icon><br>
      </div>
      <ion-label class="col-2">Buy</ion-label>
    </ion-col>
    <ion-col >
      <div class="col-1">
      <ion-icon name="bag-remove-outline" style="color: white; font-size: 25px; " [routerLink]="['/sell/',wallet[0].id]" routerLinkActive="router-link-active" ></ion-icon><br>
      </div>
      <ion-label class="col-2">Sell</ion-label>
    </ion-col>
    <ion-col >
      <div class="col-1">
      <ion-icon name="cellular-outline" style="color: white; font-size: 25px; "></ion-icon><br>
      </div>
      <ion-label class="col-2">History</ion-label>
    </ion-col>
    <ion-col >
      <div class="col-1">
      <button style="background-color: transparent ;" id="btn" (click)="btncolor()">
      <ion-icon name="contrast-outline" style="color: white; font-size: 25px; "></ion-icon><br>
      </button>
      </div>
      <ion-label class="col-2">Color</ion-label>
    </ion-col>
  </ion-row>
</div>
<ion-progress-bar color="dark" value="1"></ion-progress-bar>
 <ion-content >
   <!-- PRİCE VE PROGRESS BAR -->
    <div style="padding: 3px; border-radius: 150px;">
      <ion-row>
        <ion-col style="text-align: center; font-size: 20px; margin-top: 5px; margin-bottom: 5px;">Coins</ion-col>
        <ion-progress-bar color="primary" value="1"></ion-progress-bar>
      </ion-row>
    </div>


      <!--Wallet COİNLERİ LİSTELEME-->
  <ion-list>
    <ion-item *ngFor="let info of xarray" [routerLink]="['/details',info.id]" routerLinkActive="router-link-active" >
      <ion-avatar slot="start">
        <img src="{{info.image}}" />
      </ion-avatar>
      
      <ion-label >
        <h2>{{info.name}}</h2>
        <h3><span >Price: </span><strong >{{info.current_price.toFixed(3)}}$</strong> </h3>
      </ion-label>
      <ion-label style="text-align: right;" >
        <h2>{{info.amount.toFixed(2)}} {{info.symbol.toUpperCase()}}</h2>
        <h3><strong >{{info.amount*info.current_price.toFixed(3)}}$</strong> </h3>      </ion-label>
    </ion-item>
  </ion-list>
</ion-content> 







<ion-footer style="border-top: 1px solid grey;">
  <div style="background-color: white;">
    <ion-row>

      <ion-col style="text-align: center;"  >
        <ion-icon name="home-outline" style="font-size: 27px; color: black; " [routerLink]="['/folder']" routerLinkActive="router-link-active"></ion-icon><br>
        <ion-label style="font-size: 10px; color: black;"><strong>Home</strong></ion-label>

      </ion-col>
      <ion-col style="text-align: center; " >
        <ion-icon name="search-sharp" style="font-size: 27px; margin-right: 15px; color: black; " [routerLink]="['/search']" routerLinkActive="router-link-active" ></ion-icon><br>
        <ion-label style="font-size: 10px; margin-right: 15px; color: black;"><strong>Search</strong></ion-label>
      </ion-col>

        <ion-col>
          <div style="background-color: black; border-radius: 60%; height: 100%; text-align: center;" [routerLink]="['/details/',wallet[0].id]" routerLinkActive="router-link-active" >
            <ion-icon name="logo-bitcoin" style="color: white; font-size: 40px; margin-top: 3px;"></ion-icon><br>
          </div>
        </ion-col>

      <ion-col style="text-align: center" >
        <a  href="/wallet"><ion-icon name="wallet-outline" style="font-size: 27px;  margin-left: 15px; color: blue;"></ion-icon></a><br>
        <ion-label style=" font-size: 10px; margin-left: 15px; color: blue;"><strong>Wallet</strong></ion-label>
      </ion-col>

      <ion-col style="text-align: center" >
        <ion-icon name="person-circle-outline" style="font-size: 27px; color: black;"></ion-icon><br>
        <ion-label style=" font-size: 10px; color: black;"><strong>Account</strong></ion-label>
      </ion-col>
    </ion-row>
  </div>
</ion-footer>
