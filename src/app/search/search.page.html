<ion-content>
  <!-- REFRESHER -->
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="crescent"
      refreshingText="Refreshing...">
    </ion-refresher-content>
  </ion-refresher>
  
  <!-- SEARCHBAR LİSTELEME -->
  
  <ion-searchbar placeholder="Search Coin or Token..." color="dark" 
  [(ngModel)]="word" (ngModelChange)="found()">
  </ion-searchbar>
  
  <ion-list >
    
    <ion-item *ngFor="let info of iteminfo" [routerLink]="['/details',info.id]" routerLinkActive="router-link-active" color="dark">
      <ion-avatar slot="start">
        <img src="{{info.image}}" />
      </ion-avatar>

      <ion-label>
        <h2>{{info.name}}</h2>
        <h3><span >Price: </span><strong >{{info.current_price}}$</strong> </h3>
      </ion-label>
      <ion-label>
        <span style="margin-left: 70px; font-size: 15px;"  [ngStyle]="{'color': info.price_change_percentage_24h<0 ? 'red' : 'green' }"><strong>%{{info.price_change_percentage_24h.toFixed(2)}}</strong> </span>
      </ion-label>
        
        
    </ion-item>
  </ion-list >

<!-- COİN BAŞLIKLARI -->

<div>
    
  <ion-row>
    <ion-col style="margin-left: 5%; color: gray;">Cryptocurrencies</ion-col>
    <ion-col style="margin-left: 35%;">
      <button style="background-color: white;" (click)="coinsup()">
      <ion-icon name="arrow-up-circle-outline" style="font-size: 20px; color: green;"></ion-icon>
      </button>
      <button style="background-color: white;" (click)="coinsdown()">
      <ion-icon name="arrow-down-circle-outline" style="font-size: 20px; color: red;"></ion-icon>
      </button>
    </ion-col>
  </ion-row>
  
</div>

  <!-- COİN LİSTELEME -->
  <ion-list>
    <ion-item *ngFor="let info of tencoininfo.slice(0,more)" [routerLink]="['/details',info.id]" routerLinkActive="router-link-active"  >
      <ion-avatar slot="start">
        <img src="{{info.image}}" />
      </ion-avatar>
      
      <ion-label>
        <h2>{{info.name}}</h2>
        <h3><span >Price: </span><strong >{{info.current_price}}$</strong> </h3>
      </ion-label>
      <ion-label>
        <span style="margin-left: 70px; font-size: 15px;"  [ngStyle]="{'color': info.price_change_percentage_24h<0 ? 'red' : 'green' }"><strong>%{{info.price_change_percentage_24h.toFixed(2)}}</strong> </span>
      </ion-label>
    </ion-item>
  </ion-list>
  
   <!-- DAHA FAZLA COİN LİSTELEME  -->
   <div style="display: flex; justify-content:center" id="morecryptobutton">
    <button style="color: blue; background-color: white;" (click)="morecrypto()">
    <h6>
    İf you want to see 10 more crypto currience.
    <br>
    Just Click.
    </h6>
    </button>
  </div>

</ion-content>


<ion-footer style="border-top: 1px solid grey;">
  <div style="background-color: white;">
    <ion-row>

      <ion-col style="text-align: center;"  >
        <ion-icon name="home-outline" style="font-size: 27px; " [routerLink]="['/folder/:id']" routerLinkActive="router-link-active"></ion-icon><br>
        <ion-label style="font-size: 10px;"><strong>Home</strong></ion-label>

      </ion-col>
      <ion-col style="text-align: center; " >
        <ion-icon name="search-sharp" style="font-size: 27px; margin-right: 15px; color: blue;" ></ion-icon><br>
        <ion-label style="font-size: 10px; margin-right: 15px; color: blue;"><strong>Search</strong></ion-label>
      </ion-col>

        <ion-col>
          <div style="background-color: black; border-radius: 60%; height: 100%; text-align: center;" [routerLink]="['/details/bitcoin']" routerLinkActive="router-link-active" >
            <ion-icon name="logo-bitcoin" style="color: white; font-size: 40px; margin-top: 3px;"></ion-icon><br>
          </div>
        </ion-col>

      <ion-col style="text-align: center" [routerLink]="['/wallet']" routerLinkActive="router-link-active" >
        <ion-icon name="wallet-outline" style="font-size: 27px;  margin-left: 15px;"></ion-icon><br>
        <ion-label style=" font-size: 10px; margin-left: 15px;"><strong>Wallet</strong></ion-label>
      </ion-col>

      <ion-col style="text-align: center">
        <ion-icon name="person-circle-outline" style="font-size: 27px;"></ion-icon><br>
        <ion-label style=" font-size: 10px;"><strong>Account</strong></ion-label>
      </ion-col>
    </ion-row>
  </div>
</ion-footer>
